name: CafeOS
options:
  bundleIdPrefix: com.sumerumoudgal
targets:
  CafeOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/CafeOS
      - path: GoogleService-Info.plist
        optional: true
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseFirestoreCombine-Community
      - package: SwiftSoup
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 10.24.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0
